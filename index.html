<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>モケケ図鑑アプリ</title>
    <style>
        body { font-family: sans-serif; background: #fce4ec; padding: 20px; }
        .stats { position: sticky; top: 0; background: white; padding: 10px; text-align: center; border-radius: 10px; margin-bottom: 20px; font-weight: bold; color: #d81b60; }
        .area-section { margin-bottom: 20px; background: white; padding: 15px; border-radius: 10px; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 0; }
        .mokeke-card { border: 1px solid #eee; padding: 5px; text-align: center; border-radius: 8px; }
        .check-input { display: none; }
        .check-label { display: block; background: #ff4081; color: white; border-radius: 15px; padding: 5px; cursor: pointer; }
        .check-input:checked + .check-label { background: #4caf50; }
    </style>
</head>
<body>

<div class="stats" id="stats">収集率: 0%</div>

<div class="area-section">
    <h2>北海道</h2>
    <div class="collection-grid">
        <label class="mokeke-card"><input type="checkbox" class="check-input" data-id="hokkaido-1">ラベンダー<div class="check-label">CHECK</div></label>
        <label class="mokeke-card"><input type="checkbox" class="check-input" data-id="hokkaido-2">メロン<div class="check-label">CHECK</div></label>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('.check-input');
    const stats = document.getElementById('stats');

    // 読み込み時に保存された状態を復元
    inputs.forEach(input => {
        input.checked = localStorage.getItem(input.dataset.id) === 'true';
        input.addEventListener('change', () => {
            localStorage.setItem(input.dataset.id, input.checked);
            updateStats();
        });
    });

    function updateStats() {
        const total = inputs.length;
        const checked = document.querySelectorAll('.check-input:checked').length;
        stats.innerText = `収集率: ${Math.round((checked / total) * 100)}% (${checked}/${total})`;
    }
    updateStats();
</script>
</body>
</html>
