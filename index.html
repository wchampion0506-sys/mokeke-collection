    <meta charset="UTF-8">

    <title>マイ・モケケ・コレクション図鑑</title>
    <style>
        /* ここからCSS（デザイン） */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f7f7f7; /* 薄いグレーの背景 */
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #ff6f61; /* 本家っぽいポップな赤/オレンジ */
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* コレクションのグリッド（タイル状に並べる） */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* スマホでも見やすく自動調整 */
            gap: 20px;
            padding: 0;
            list-style: none;
        }

        /* 各モケケのカード */
        .mokeke-card {
            background-color: #fff;
            border-radius: 15px; /* 角丸でかわいく */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* 浮き出るような影 */
            overflow: hidden;
            transition: transform 0.2s; /* ホバー時のアニメーション */
            text-align: center;
            position: relative;
        }

        .mokeke-card:hover {
            transform: translateY(-5px); /* 少し上に浮く */
        }

        /* 写真を入れるエリア */
        .mokeke-image-placeholder {
            width: 100%;
            height: 150px;
            background-color: #eee; /* 写真がない時のグレー背景 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 0.8em;
        }

        /* 実際のモケケ画像（まだないので、後で使う用） */
        .mokeke-image {
            width: auto;
            max-width: 100%;
            height: 100%;
            object-fit: contain; /* 画像を枠内に収める */
        }

        /* モケケの名前とエリア */
        .mokeke-info {
            padding: 10px;
        }

        .mokeke-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 5px;
        }

        .mokeke-area {
            font-size: 0.9em;
            color: #777;
            margin-bottom: 10px;
        }

        /* チェックボックスのスタイルを本家っぽくカスタム */
        .mokeke-check-label {
            display: inline-block;
            background-color: #ff6f61;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background-color 0.2s;
        }

        /* 集めたもの（チェックが入った時）のスタイル */
        .mokeke-check-input:checked + .mokeke-check-label {
            background-color: #4caf50; /* 集めたらグリーンに */
        }
        
        .mokeke-check-input:checked + .mokeke-check-label::before {
            content: "✓ "; /* チェックマークを表示 */
        }

        /* チェックボックス自体は隠す */
        .mokeke-check-input {
            display: none;
        }

    </style>
</head>
